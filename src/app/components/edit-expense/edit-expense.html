<div class="container mt-4">
    <h1 class="text-center mb-4">Edit Expense</h1>

    <div class="card p-4 shadow-sm">
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input
            type="text"
            class="form-control"
            [(ngModel)]="title"
        />
    </div>

    <div class="mb-3">
        <label class="form-label">Amount</label>
        <input
            type="number"
            class="form-control"
            [(ngModel)]="amount"
        />
    </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" [(ngModel)]="category">
            @for (cat of expenseService.categories(); track cat) {
                <option [value]="cat">{{ cat }}</option>
            }
            </select>
        </div>

    <div class="d-flex gap-2">
        <button class="btn btn-primary" (click)="updateExpense()">
        Save Changes
        </button>

        <button class="btn btn-secondary" routerLink="/expenses">
        Cancel
        </button>
    </div>
    </div>
</div>
