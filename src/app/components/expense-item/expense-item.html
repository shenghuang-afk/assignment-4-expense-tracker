<div class="card p-3 shadow-sm" [class.border-danger]="isHighExpense()">
    <h4>{{ expense.title }}</h4>
    <p class="mb-1">Category: {{ expense.category }}</p>
    <p class="mb-3">Amount: ${{ expense.amount.toFixed(2) }}</p>

    <div class="d-flex gap-2">
    <a class="btn btn-warning" [routerLink]="['/edit', expense.id]">Edit</a>
    <button class="btn btn-danger" (click)="deleteExpense()">Delete</button>
    </div>
</div>
