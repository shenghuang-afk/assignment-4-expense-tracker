<div class="card p-3" [class.border-danger]="isHighExpense()">
    <h5>{{ expense.title }}</h5>
    <p [style.color]="getCategoryColor()">
        Category: {{ expense.category }}
    </p>
    <p>Amount: ${{ expense.amount.toFixed(2) }}</p>

    <button class="btn btn-danger" (click)="deleteExpense()">
        Delete
    </button>
</div>
